<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>競馬</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0e;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      width: 100vw;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans JP", sans-serif;
      overflow: hidden;
    }

    /* =====================
       TOP BAR (常時表示)
    ===================== */
    .top-bar {
      flex: 0 0 auto;
      min-height: 44px;
      background: #0a0a0a;
      border-bottom: 1px solid #252523;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 14px;
      flex-wrap: wrap;
      row-gap: 1px;
    }
    .top-race-name {
      font-size: 16px;
      font-weight: bold;
      color: #ccc;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .top-bankroll {
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: 10px;
    }
    @media (max-width: 420px) {
      .top-bar { padding: 4px 14px 3px; }
      .top-race-name { flex: 0 0 100%; }
      .top-bankroll { margin-left: auto; }
    }

    /* =====================
       GAME AREA
    ===================== */
    .game-area {
      flex: 1;
      position: relative;
      background: #15151a;
      overflow: hidden;
      min-height: 0;
      box-shadow: inset 0 0 28px rgba(0,0,0,0.9);
    }

    /* ---- LCD screens ---- */
    .ls {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      color: #ddd;
      font-size: 11px;
      line-height: 1.45;
      overflow: hidden;
    }
    .ls.hidden { display: none !important; }

    .ls-scroll { flex: 1; overflow-y: auto; padding: 7px 8px; }
    .ls-scroll::-webkit-scrollbar { width: 3px; }
    .ls-scroll::-webkit-scrollbar-thumb { background: #333; }

    .ls-foot {
      flex-shrink: 0;
      padding: 5px 8px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 5px;
      background: rgba(0,0,0,0.3);
    }

    /* ---- Title screen ---- */
    #screenRealTitle {
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      background: #0a0a0e;
    }
    .lcd-game-title { font-size: 22px; font-weight: 900; color: #fff; letter-spacing: 0.05em; text-align: center; }
    .lcd-title-img { width: 88%; max-height: 72%; object-fit: contain; }
    .lcd-hint { font-size: 9px; color: #555; margin-top: 4px; }

    /* ---- Prologue ---- */
    .pro-title { font-size: 12px; font-weight: 700; color: #ccc; padding: 6px 8px 3px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .pro-body { font-size: 11px; line-height: 1.7; white-space: pre-wrap; color: #bbb; }

    /* ---- Buy screen ---- */
    .lcd-tabs { display: flex; gap: 4px; padding: 5px 6px 0; flex-shrink: 0; }
    .lcd-tab { padding: 3px 10px; border: 1px solid #444; border-radius: 5px 5px 0 0; background: #1a1a1a; color: #888; font-size: 10px; cursor: pointer; }
    .lcd-tab.active { border-color: #777; color: #ddd; background: #2a2a2a; }
    .lcd-amount-row { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; margin-top: 4px; }
    .lcd-amount-row input[type="number"] { width: 80px; padding: 4px 5px; border: 1px solid #444; border-radius: 5px; background: #1a1a1a; color: #ddd; font-size: 10px; }
    .lcd-amt-btns { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 3px; }
    .lcd-amt-btn { padding: 3px 6px; border: 1px solid #3a3a3a; border-radius: 4px; background: #1e1e1e; color: #aaa; font-size: 9px; cursor: pointer; }

    #screenPrologue .ls-scroll { padding-left: 0; padding-right: 0; }
    #screenPrologue .pro-body { font-size: 17px; padding: 0 8px; }
    #screenOpening .pro-body { font-size: 17px; padding: 0 8px; }
    #screenEnding .pro-body { font-size: 17px; padding: 0 8px; }
    #screenGameOver .pro-body { font-size: 17px; padding: 0 8px; }

    /* ---- メニュー画面 ---- */
    .menu-section { padding: 18px 14px; border-bottom: 1px solid #2a2a28; }
    .menu-section-title { font-size: 18px; font-weight: bold; color: #b0a070; margin-bottom: 12px; }
    .menu-password { font-size: 34px; font-weight: bold; color: #fff; font-family: monospace; letter-spacing: 6px; text-align: center; padding: 14px 0; background: #111; border-radius: 8px; user-select: all; }
    .menu-hint { font-size: 13px; color: #666; margin-top: 8px; }
    .menu-input-row { display: flex; gap: 8px; margin-top: 10px; }
    .menu-input-row input { flex: 1; font-size: 20px; padding: 10px 8px; border: 1px solid #444; background: #111; color: #fff; border-radius: 6px; font-family: monospace; }
    .menu-input-row button { padding: 10px 18px; background: #1a3a1a; color: #7df07d; border: 1px solid #3a7a3a; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; }
    .menu-pw-result { font-size: 14px; margin-top: 8px; }

    #screenBuy { background: #fff; }
    #screenBuy .ls-scroll { background: #fff; }
    .buy-top-bar { display: flex; align-items: flex-end; padding: 5px 6px 0; border-bottom: 1px solid #ddd; flex-shrink: 0; background: #fff; }
    .buy-top-bar .lcd-tabs { padding: 0; flex: 1; border: none; }
    .buy-bankroll { font-size: 12px; color: #555; padding: 0 4px 6px; white-space: nowrap; flex-shrink: 0; }
    .buy-bankroll b { color: #111; }
    .buy-sel-label { font-size: 14px; font-weight: 700; color: #333; padding: 6px 8px 3px 2px; }
    .buy-cart-section { border-top: 2px solid #333; margin-top: 8px; padding-top: 4px; }
    .buy-cart-header { font-size: 14px; font-weight: 700; color: #111; padding: 2px 0 4px; }
    .cart-row-sel { cursor: pointer; }
    .cart-row-sel:hover td { background: #f5f5f5 !important; }
    .cart-row-sel.selected td { background: #e8f0fe !important; }
    #screenBuy .lcd-tab { font-size: 20px; padding: 5px 16px; background: #f0f0f0; color: #666; border-color: #ccc; }
    #screenBuy .lcd-tab.active { background: #fff; color: #111; border-color: #999; border-bottom-color: #fff; }
    #screenBuy .buy-bankroll { font-size: 16px; }
    #screenBuy .buy-bankroll b { font-size: 18px; }
    #screenBuy .buy-sel-label { font-size: 20px; }
    #screenBuy .buy-cart-header { font-size: 18px; }
    #screenBuy .lcd-amt-btn { font-size: 18px; padding: 5px 10px; background: #f5f5f5; color: #333; border-color: #ccc; }
    #screenBuy .lcd-amount-row input[type="number"] { font-size: 18px; width: 120px; padding: 5px 7px; background: #fff; color: #111; border-color: #bbb; }
    #screenBuy .lcd-amount-row .lcd-btn-sm { font-size: 20px; padding: 5px 14px; }
    #screenBuy .ls-foot { background: #fff; border-top: 2px solid #ddd; }
    #screenBuy .ls-foot .lcd-btn-sm { font-size: 18px; padding: 6px 12px; background: #f0f0f0; color: #333; border-color: #ccc; }
    #screenBuy .ls-foot .lcd-btn-sm.primary { background: #333; color: #fff; border-color: #333; }
    #screenBuy .ls-foot .lcd-btn-sm.danger { background: #fff0f0; color: #cc0000; border-color: #e08080; }
    #screenBuy .lcd-hint { font-size: 16px; padding: 3px 0; color: #333; }
    #screenBuy .lcd-danger { font-size: 16px; }
    #screenBuy .lcd-table { font-size: 15px; }
    #screenBuy .lcd-table th { font-size: 15px; padding: 5px 6px; background: #f0f0f0; color: #555; border-bottom: 1px solid #ccc; }
    #screenBuy .lcd-table td { font-size: 15px; padding: 5px 6px; color: #111; border-bottom: 1px solid #eee; background: #fff; }
    #screenBuy .lcd-subtxt { font-size: 13px; color: #888; }

    .horse-row { display: flex; align-items: center; padding: 7px 8px; border-bottom: 1px solid #ddd; background: #fff; color: #111; cursor: pointer; gap: 8px; }
    .horse-row:last-child { border-bottom: none; }
    .horse-row.active { background: #e8f0fe; box-shadow: inset 0 0 0 2px #3366cc; }
    .horse-row.qu1-selected { background: #fff3e0; box-shadow: inset 0 0 0 2px #ff8800; }
    .horse-row.disabled { opacity: 0.4; cursor: default; }
    .hr-num { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; flex-shrink: 0; background: #888; color: #fff; }
    .hr-num.waku-c1 { background: #fff; color: #000; border: 1px solid #aaa; }
    .hr-num.waku-c2 { background: #111; color: #fff; }
    .hr-num.waku-c3 { background: #e63333; color: #fff; }
    .hr-num.waku-c4 { background: #3366cc; color: #fff; }
    .hr-num.waku-c5 { background: #f5c800; color: #000; }
    .hr-num.waku-c6 { background: #339933; color: #fff; }
    .hr-num.waku-c7 { background: #ff8800; color: #fff; }
    .hr-num.waku-c8 { background: #ff66aa; color: #fff; }
    .hr-info { flex: 1; display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .hr-name { font-size: 16px; color: #000; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hr-jockey { font-size: 12px; color: #555; }
    .hr-odds { font-size: 16px; color: #222; flex-shrink: 0; text-align: right; white-space: nowrap; }
    #tanshokuList, #quinList1 { border: 1px solid #ddd; border-radius: 4px; overflow: hidden; margin-bottom: 6px; background: #fff; }

    .lcd-btn-sm { padding: 4px 8px; border: 1px solid #555; border-radius: 5px; background: #252525; color: #ccc; font-size: 10px; cursor: pointer; white-space: nowrap; }
    .lcd-btn-sm.primary { border-color: #888; color: #fff; background: #303030; }
    .lcd-btn-sm.danger { border-color: #7a3030; color: #f88; background: #2a1a1a; }

    .lcd-table { width: 100%; border-collapse: collapse; font-size: 9px; margin-top: 4px; }
    .lcd-table th { background: #222; color: #888; padding: 3px 4px; border-bottom: 1px solid #333; text-align: left; }
    .lcd-table td { padding: 3px 4px; border-bottom: 1px solid #222; vertical-align: top; color: #bbb; }
    .lcd-subtxt { font-size: 8px; color: #666; }
    .lcd-hint { font-size: 9px; color: #555; padding: 2px 0; }
    .lcd-danger { color: #f77; font-size: 9px; }

    .lcd-video { width: 100%; display: block; background: #000; object-fit: contain; }

    .video-controls {
      flex: 0 0 54px;
      display: flex;
      background: #0a0a0a;
      border-top: 1px solid #252523;
    }
    .video-ctrl-btn {
      flex: 1;
      height: 54px;
      background: transparent;
      border: none;
      border-right: 1px solid #252523;
      color: #8a7d5a;
      font-size: 22px;
      font-weight: bold;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans JP", sans-serif;
      cursor: pointer;
      text-align: center;
      line-height: 54px;
      padding: 0;
    }
    .video-ctrl-btn:last-child { border-right: none; }
    .video-ctrl-btn:active { background: #252522; color: #b0a070; }
    .video-ctrl-skip { font-size: 16px; }

    .vol-popup {
      display: none;
      position: absolute;
      bottom: 54px;
      right: 54px;
      width: 54px;
      height: 160px;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 8px 8px 0 0;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .vol-popup.open { display: flex; }
    .vol-popup input[type=range] {
      writing-mode: vertical-lr;
      direction: rtl;
      height: 130px;
      width: 32px;
      cursor: pointer;
      accent-color: #b0a070;
    }

    .settle-sum-line { font-size: 18px; font-weight: 800; color: #fff; padding: 3px 0; }
    .delta-plus { color: #5dba5d; }
    .delta-minus { color: #f77; }
    .badge-hit { display: inline-block; padding: 0 5px; border-radius: 99px; background: #1a4a1a; border: 1px solid #3a7a3a; color: #7df07d; font-size: 13px; margin-left: 3px; }
    .badge-lose { display: inline-block; padding: 0 5px; border-radius: 99px; background: #4a1a1a; border: 1px solid #7a3a3a; color: #f07d7d; font-size: 13px; margin-left: 3px; }
    #screenResult .lcd-table { font-size: 16px; }
    #screenResult .lcd-table th { font-size: 16px; padding: 5px 8px; white-space: nowrap; }
    #screenResult .lcd-table td { font-size: 16px; padding: 5px 8px; white-space: nowrap; }
    #screenSettlement .lcd-table { font-size: 16px; }
    #screenSettlement .lcd-table th { font-size: 15px; padding: 5px 6px; }
    #screenSettlement .lcd-table td { font-size: 16px; padding: 6px 6px; }

    .lcd-rate { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
    .lcd-rate-num { font-size: 28px; font-weight: 900; color: #fff; }
    .lcd-rate-end { font-size: 16px; font-weight: 800; color: #888; }
    .lcd-rate-clear { font-size: 20px; font-weight: 900; color: #5dba5d; }

    .lcd-gameover { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 950; color: #f00; letter-spacing: 2px; background: #0a0000; }

    #oddsFrame { flex: 1; width: 100%; border: none; background: #fff; display: block; }

    /* =====================
       NAV BAR (常時表示)
    ===================== */
    .nav-bar {
      flex: 0 0 58px;
      display: flex;
      background: #0a0a0a;
      border-top: 1px solid #252523;
    }
    .nav-rect-btn {
      flex: 1;
      height: 58px;
      background: transparent;
      border: none;
      border-right: 1px solid #252523;
      color: #8a7d5a;
      font-size: 18px;
      font-weight: bold;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans JP", sans-serif;
      cursor: pointer;
      text-align: center;
      line-height: 1.2;
      transition: background 0.08s, color 0.08s;
      white-space: normal;
      word-break: keep-all;
      padding: 4px 2px;
    }
    .nav-rect-btn:last-child { border-right: none; }
    .nav-rect-btn:hover { background: #1a1a18; }
    .nav-rect-btn:active { background: #252522; color: #b0a070; }

    /* =====================
       購入済馬券 ポップアップ
    ===================== */
    .cart-popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    .cart-popup {
      background: #fff;
      color: #111;
      border-radius: 12px;
      padding: 20px;
      max-width: 90%;
      min-width: 260px;
      max-height: 70vh;
      overflow-y: auto;
    }
    .cart-popup-title {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 10px;
      border-bottom: 2px solid #333;
      padding-bottom: 8px;
    }
    .cart-popup-item {
      padding: 9px 0;
      border-bottom: 1px solid #eee;
      font-size: 16px;
      line-height: 1.5;
    }
    .cart-popup-item:last-child { border-bottom: none; }
    .cart-popup-empty { color: #888; font-size: 16px; }
  </style>
</head>
<body>

<!-- 音 -->
<audio id="bgm" src="data/City_Ambi-Street02-2.mp3" loop preload="auto"></audio>
<audio id="seCart" src="data/cart.mp3" preload="auto"></audio>
<audio id="seChoice" src="data/choise.mp3" preload="auto"></audio>
<audio id="seMoney" src="data/money.mp3" preload="auto"></audio>
<audio id="taiko01" src="data/taiko01.mp3" preload="auto"></audio>
<audio id="taiko02" src="data/taiko02.mp3" preload="auto"></audio>
<audio id="endthemeAudio" src="game/ending/endtheme.m4a" preload="auto"></audio>

<!-- ========== TOP BAR ========== -->
<div class="top-bar">
  <div class="top-race-name" id="topRaceName"></div>
  <div class="top-bankroll" id="topBankroll"></div>
</div>

<!-- ========== GAME AREA ========== -->
<div class="game-area">

  <!-- 読み込み中 -->
  <div id="screenLoading" class="ls" style="align-items:center;justify-content:center;gap:10px;background:#0a0a0e;">
    <div style="color:#555;font-size:17px;letter-spacing:0.1em;">読み込み中...</div>
  </div>

  <!-- タイトル -->
  <div id="screenRealTitle" class="ls hidden">
    <img class="lcd-title-img" src="data/horce.png" alt="">
    <div class="lcd-game-title">Horse racing</div>
    <div class="lcd-hint">画面をタッチ または レース開始 ボタン</div>
  </div>

  <!-- プロローグ -->
  <div id="screenPrologue" class="ls hidden">
    <img id="proImage" src="" alt="" style="width:100%;max-height:55%;display:none;object-fit:contain;flex-shrink:0;">
    <div class="ls-scroll" id="proScroll">
      <div class="pro-body" id="proText"></div>
    </div>
  </div>

  <!-- 馬券購入 -->
  <div id="screenBuy" class="ls hidden">
    <div class="buy-top-bar">
      <div class="lcd-tabs">
        <div class="lcd-tab active" id="tabExacta">馬単</div>
        <div class="lcd-tab" id="tabQuinella">馬連</div>
      </div>
      <div class="buy-bankroll">所持金 <b><span id="bankrollLabel">0</span>円</b></div>
    </div>
    <div class="ls-scroll" id="buyScroll">
      <div id="areaTanshoku">
        <div id="tanshokuList"></div>
        <div class="buy-sel-label" id="selLabelTan">馬を選んでください</div>
        <div class="lcd-amount-row">
          <input type="number" id="stakeTan" min="0" step="100" value="0" />
          <button class="lcd-btn-sm primary" id="btnAddTan">カートへ入れる</button>
        </div>
        <div class="lcd-amt-btns" id="amtBarTan"></div>
      </div>
      <div id="areaQuinella" style="display:none">
        <div id="quinList1"></div>
        <div class="buy-sel-label" id="quinStep">1着の馬を決める</div>
        <div class="lcd-amount-row">
          <input type="number" id="stakeQu" min="0" step="100" value="0" />
          <button class="lcd-btn-sm primary" id="btnAddQu">カートへ入れる</button>
        </div>
        <div class="lcd-amt-btns" id="amtBarQu"></div>
      </div>
      <div class="buy-cart-section">
        <div class="buy-cart-header">カート</div>
        <div class="lcd-hint" id="limitHint"></div>
        <table class="lcd-table">
          <thead><tr><th>券種</th><th>買い目</th><th>倍</th><th>金額</th><th>想定払戻</th></tr></thead>
          <tbody id="cartRows"></tbody>
        </table>
      </div>
    </div>
    <div class="ls-foot">
      <button class="lcd-btn-sm" id="btnViewCart">購入済馬券</button>
      <button class="lcd-btn-sm danger" id="btnCancelCart">取消</button>
      <button class="lcd-btn-sm primary" id="btnConfirm">決定</button>
    </div>
  </div>

  <!-- 動画 -->
  <div id="screenVideo" class="ls hidden" style="background:#000;">
    <div id="videoWrapper" style="width:100%;position:relative;background:#000;overflow:hidden;">
      <video id="raceVideo" class="lcd-video" playsinline preload="auto" style="width:100%;max-height:55dvh;display:block;object-fit:contain;cursor:pointer"></video>
      <div id="videoPlayOverlay" style="display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);color:#fff;font-size:22px;cursor:pointer;gap:12px">
        <span>▶ タップして再生</span>
        <span id="videoDebug" style="font-size:10px;color:#fa0;max-width:90%;word-break:break-all;text-align:center"></span>
      </div>
    </div>
    <div class="video-controls" id="videoControls" style="position:relative;display:none;">
      <div class="vol-popup" id="volPopup"><input type="range" id="volSlider" min="0" max="100" value="70" step="5"></div>
      <button class="video-ctrl-btn" id="btnVidRewind">◁◁</button>
      <button class="video-ctrl-btn" id="btnVidPlayPause">▶</button>
      <button class="video-ctrl-btn" id="btnVidForward">▷▷</button>
      <button class="video-ctrl-btn video-ctrl-skip" id="btnVidVolume">音量</button>
      <button class="video-ctrl-btn video-ctrl-skip" id="btnVidSkip">スキップ</button>
    </div>
    <div id="videoTickets" style="padding:4px 8px;background:#0a0a0a;border-top:1px solid #1e1e1e;overflow:hidden;font-size:15px;color:#fff;line-height:1.6;"></div>
  </div>

  <!-- 着順 -->
  <div id="screenResult" class="ls hidden">
    <div class="ls-scroll" style="overflow-x:auto;">
      <table class="lcd-table" id="resultTable">
        <thead><tr><th>着</th><th>枠</th><th>馬番</th><th>馬名</th><th>タイム</th><th>着差</th></tr></thead>
        <tbody id="resultRows"></tbody>
      </table>
    </div>
  </div>

  <!-- 清算 -->
  <div id="screenSettlement" class="ls hidden">
    <div class="pro-title" id="settleSub">清算</div>
    <div class="ls-scroll">
      <table class="lcd-table">
        <thead><tr><th>券種</th><th>買い目</th><th>倍</th><th>金額</th><th>想定払戻</th></tr></thead>
        <tbody id="settleRows"></tbody>
      </table>
      <div style="padding:6px 0 2px">
        <div class="settle-sum-line">払戻：<span id="settlePayout">0</span>円</div>
        <div class="settle-sum-line">BET：<span id="settleBet">0</span>円</div>
        <div class="settle-sum-line">差引：<span id="settleDelta" class="delta-plus">+0</span>円</div>
        <div class="settle-sum-line">所持金：<span id="settleFinal">0</span>円</div>
      </div>
      <div style="text-align:center;padding:4px 0">
        <img id="settleImg" src="" alt="" style="max-width:100%;display:none">
      </div>
    </div>
    <div id="actionsNormal" style="display:none"></div>
    <div id="actionsZero" style="display:none"></div>
  </div>

  <!-- メニュー -->
  <div id="screenMenu" class="ls hidden">
    <div class="ls-scroll">
      <div class="menu-section">
        <div class="menu-section-title">復活の呪文</div>
        <div class="menu-password" id="menuPassword">------</div>
        <div class="menu-hint">この数字を記録しておくと次回から途中で再開できます</div>
      </div>
      <div class="menu-section">
        <div class="menu-section-title">呪文の入力</div>
        <div class="menu-input-row">
          <input type="text" inputmode="numeric" id="menuPwInput" placeholder="呪文を入力" maxlength="12" />
          <button id="menuPwSubmit">開始</button>
        </div>
        <div class="menu-pw-result" id="menuPwResult"></div>
      </div>
    </div>
  </div>

  <!-- オープニング -->
  <div id="screenOpening" class="ls hidden" style="background:#000;">
    <div style="width:100%;background:#000;flex-shrink:0;">
      <video id="openingVideo" class="lcd-video" playsinline preload="auto" style="width:100%;max-height:45dvh;display:block;object-fit:contain;"></video>
    </div>
    <div class="ls-scroll" id="openingScroll">
      <div class="pro-body" id="openingText"></div>
    </div>
    <div class="ls-foot" style="justify-content:flex-end;">
      <button class="lcd-btn-sm primary" id="btnOpeningNext" style="font-size:16px;padding:8px 20px;">次へ</button>
    </div>
  </div>

  <!-- ゲームオーバー -->
  <div id="screenGameOver" class="ls hidden" style="background:#000;">
    <div class="lcd-gameover" style="flex:0 0 80px;">GAME OVER</div>
    <div class="ls-scroll">
      <div class="pro-body" id="gameoverText" style="color:#bbb;"></div>
    </div>
    <div class="ls-foot" style="justify-content:flex-end;">
      <button class="lcd-btn-sm primary" id="btnGameoverNext" style="font-size:16px;padding:8px 20px;">次へ</button>
    </div>
  </div>

  <!-- エンディング -->
  <div id="screenEnding" class="ls hidden" style="background:#000;">
    <div style="width:100%;background:#000;flex-shrink:0;">
      <video id="endingVideo" class="lcd-video" playsinline preload="auto" style="width:100%;max-height:45dvh;display:block;object-fit:contain;"></video>
    </div>
    <div class="ls-scroll" id="endingScroll">
      <div class="pro-body" id="endingText"></div>
    </div>
    <div id="endingBlackout" style="display:none;position:absolute;inset:0;background:#000;align-items:center;justify-content:center;opacity:0;transition:opacity 2s ease;z-index:10;">
      <div style="color:#fff;font-size:18px;letter-spacing:2px;">To Be Continued</div>
    </div>
  </div>

  <!-- 達成率 -->
  <div id="screenRate" class="ls hidden">
    <div class="lcd-rate">
      <div class="lcd-rate-num" id="rateLine">達成率＝0％</div>
      <div class="lcd-rate-end">The End</div>
      <div class="lcd-rate-clear" id="rateClear"></div>
    </div>
  </div>

  <!-- 出走表 -->
  <div id="screenOdds" class="ls hidden">
    <iframe id="oddsFrame" sandbox="allow-same-origin allow-scripts"></iframe>
  </div>

  <!-- 新聞 -->
  <div id="screenShinbun" class="ls hidden" style="background:#fff;color:#111">
    <div class="ls-scroll" style="background:#fff">
      <div id="shinbunContent" style="white-space:pre-wrap;font-size:16px;line-height:1.8;color:#111;padding:4px 0"></div>
    </div>
  </div>

</div><!-- /.game-area -->

<!-- ========== NAV BAR ========== -->
<div class="nav-bar">
  <button class="nav-rect-btn" id="navToggle">メニュー</button>
  <button class="nav-rect-btn" id="navInfo">新聞</button>
  <button class="nav-rect-btn" id="navOdds">出走表</button>
  <button class="nav-rect-btn" id="navBet">馬券購入</button>
  <button class="nav-rect-btn" id="navStart">レース開始</button>
</div>

<!-- ========== 購入済馬券ポップアップ ========== -->
<div class="cart-popup-overlay" id="cartPopupOverlay">
  <div class="cart-popup">
    <div class="cart-popup-title">購入済馬券</div>
    <div id="cartPopupContent"></div>
  </div>
</div>

<script>
(async () => {
  const $ = (s) => document.querySelector(s);

  const bgm     = $("#bgm");
  const seCart  = $("#seCart");
  const seChoice= $("#seChoice");
  const seMoney = $("#seMoney");
  const taiko01 = $("#taiko01");
  const taiko02 = $("#taiko02");

  bgm.volume = 0.20; seChoice.volume = 0.70; seCart.volume = 0.70;
  seMoney.volume = 0.80; taiko01.volume = 0.90; taiko02.volume = 0.90;

  function play(a){ try{ a.currentTime=0; a.play(); }catch{} }
  function bgmPlay(){ try{ if(bgm.paused) bgm.play(); }catch{} }
  function bgmStop(){ try{ bgm.pause(); bgm.currentTime=0; }catch{} }
  function stopAllAudio(){
    [bgm,seCart,seChoice,seMoney,taiko01,taiko02].forEach(a=>{ try{ a.pause(); a.currentTime=0; }catch{} });
    clearTaikoTimers();
  }
  function yen(n){ return (n??0).toLocaleString("ja-JP"); }
  function f1(n){ return (Math.round(n*10)/10).toFixed(1); }

  const ALL_SCREENS = ["#screenLoading","#screenRealTitle","#screenOpening","#screenPrologue","#screenBuy","#screenVideo","#screenResult","#screenSettlement","#screenGameOver","#screenEnding","#screenRate","#screenOdds","#screenShinbun","#screenMenu"];
  function hideAllScreens(){ ALL_SCREENS.forEach(id=>$(id).classList.add("hidden")); }
  function showScreen(id){ hideAllScreens(); $(id).classList.remove("hidden"); updateTopBar(); }
  function activeScreen(){ return ALL_SCREENS.find(s=>!$(s).classList.contains("hidden")); }

  // ---- Race loader ----
  async function loadAllRaces(){
    let startBankroll=50000, goalBankroll=10000000;
    try{
      const cfg=await fetch('game/config.json').then(r=>r.ok?r.json():null);
      if(cfg){ if(cfg.startBankroll) startBankroll=cfg.startBankroll; if(cfg.goalBankroll) goalBankroll=cfg.goalBankroll; }
    }catch{}

    const EPISODES={};
    let epNum=1, miss=0;
    const sjis=b=>new TextDecoder('shift-jis').decode(b);
    for(let i=1;i<=99;i++){
      const id=String(i).padStart(2,'0');
      const base=`game/${id}`;
      const rr=await fetch(`${base}/着順.csv`);
      if(!rr.ok){ if(++miss>=2) break; continue; }
      miss=0;

      const [resultBuf,oddsResp,commentResp,entryResp]=await Promise.all([
        rr.arrayBuffer(), fetch(`${base}/オッズ.csv`), fetch(`${base}/レースコメント.txt`), fetch(`${base}/出走表.html`),
      ]);
      const resultText =sjis(resultBuf);
      const oddsText   =oddsResp.ok    ?sjis(await oddsResp.arrayBuffer())   :'';
      const commentText=commentResp.ok ?await commentResp.text():'';
      const videoPath  =`${base}/race.mp4`;
      const entryHtml  =entryResp.ok   ?await entryResp.text()  :'';

      const horseList=[];
      let raceTitle=`レース ${id}`;
      if(entryHtml){
        const doc2=new DOMParser().parseFromString(entryHtml,"text/html");
        if(doc2.title) raceTitle=doc2.title.trim();
        let ci={num:-1,name:-1,jockey:-1,odds:-1};
        const headerRow=doc2.querySelector("thead tr, tr");
        if(headerRow){
          headerRow.querySelectorAll("th,td").forEach((th,i)=>{
            const t=th.textContent.trim();
            if(t==='馬番') ci.num=i;
            else if(t==='馬名') ci.name=i;
            else if(t==='騎手') ci.jockey=i;
            else if(t==='単勝') ci.odds=i;
          });
        }
        if(ci.num<0) ci.num=0;
        if(ci.name<0) ci.name=1;
        if(ci.jockey<0) ci.jockey=2;
        if(ci.odds<0) ci.odds=3;
        doc2.querySelectorAll("tbody tr").forEach(tr=>{
          const cells=tr.querySelectorAll("td");
          if(cells.length<=ci.num) return;
          const num=parseInt(cells[ci.num]?.textContent.trim());
          const name=(cells[ci.name]?.textContent.trim())||'';
          if(!num||!name) return;
          const jockey=(cells[ci.jockey]?.textContent.trim())||'';
          const tanOdds=parseFloat(cells[ci.odds]?.textContent.trim());
          const waku=ci.num>0?parseInt(cells[0]?.textContent.trim())||0:0;
          horseList.push({num, name, jockey, tanOdds:isNaN(tanOdds)?0:tanOdds, waku});
        });
      }

      const exactaMap=new Map(), quinellaMap=new Map(), horseSet=new Set();
      oddsText.trim().split('\n').slice(1).forEach(line=>{
        const cols=line.split(',').map(s=>s.trim());
        const u1=Number(cols[0]), u2=Number(cols[1]);
        if(!u1||!u2) return;
        horseSet.add(u1); horseSet.add(u2);
        const ex12=parseFloat(cols[2]), ex21=parseFloat(cols[3]), qu=parseFloat(cols[4]);
        if(!isNaN(ex12)) exactaMap.set(`${u1}>${u2}`,ex12);
        if(!isNaN(ex21)) exactaMap.set(`${u2}>${u1}`,ex21);
        if(!isNaN(qu))   quinellaMap.set(`${Math.min(u1,u2)}>${Math.max(u1,u2)}`,qu);
      });

      let first=0, second=0;
      resultText.trim().split('\n').forEach(line=>{
        const cols=line.split(',').map(s=>s.trim());
        const rank=parseInt(cols[0]);
        if(isNaN(rank)||rank<1) return;
        const horse=parseInt(cols[2]);
        if(rank===1&&horse) first=horse;
        if(rank===2&&horse) second=horse;
      });
      const result={first, second};

      const lines2=commentText.trim().split('\n');
      const title=lines2[0]?lines2[0].trim():`レース ${id}`;

      EPISODES[epNum]={ id, title, raceTitle, comment:commentText, videoPath, entryHtml, horseList,
        horses:[...horseSet].sort((a,b)=>a-b), exactaMap, quinellaMap, result, resultCsv:resultText,
        shinbunPath:`${base}/新聞.txt` };
      epNum++;
    }
    return { EPISODES, totalEpisodes:epNum-1, startBankroll, goalBankroll };
  }

  const {EPISODES,totalEpisodes,startBankroll,goalBankroll}=await loadAllRaces();

  let episode=1, bankroll=startBankroll, episodeStartBankroll=startBankroll;
  let mode="tanshoku", selectedQu1=null, selectedQu2=null, selectedTan=null;
  let cart=[], purchasedTickets=[], settledEpisode=1, taikoTimer=null;
  let oddsReturnScreen="#screenPrologue";
  const shinbunPaid=new Set();

  // ---- Top bar ----
  const RACE_DATES=["","1989年4月16日","1989年4月30日","1989年5月14日","1989年5月28日","1989年6月11日","1989年10月29日","1989年11月5日","1989年11月19日","1989年11月26日","1989年12月24日"];

  const NAV_HIDDEN_SCREENS=new Set(["#screenRealTitle","#screenLoading","#screenOpening","#screenEnding","#screenGameOver"]);

  function updateTopBar(){
    const active=activeScreen();
    const navBar=document.querySelector(".nav-bar");
    navBar.style.display=NAV_HIDDEN_SCREENS.has(active)?"none":"";
    if(NAV_HIDDEN_SCREENS.has(active)){
      document.getElementById("topRaceName").textContent="";
      document.getElementById("topBankroll").textContent="";
    } else {
      const ep=EPISODES[episode];
      const dateStr=RACE_DATES[episode]||"";
      document.getElementById("topRaceName").textContent=ep?`${dateStr}　${ep.raceTitle.replace(/^\d{4}年\s*/,'')}`:"";
      document.getElementById("topBankroll").textContent=ep?`所持金 ${yen(bankroll)}円`:"";
    }
    if(active==="#screenSettlement") $("#navStart").textContent="次へ";
    else if(active==="#screenVideo") $("#navStart").textContent="次へ";
    else if(active==="#screenResult") $("#navStart").textContent="精算";
    else if(active==="#screenEnding") $("#navStart").textContent="次へ";
    else if(active==="#screenGameOver") $("#navStart").textContent="次へ";
    else $("#navStart").textContent="レース開始";
  }

  // ---- 出走表 ----
  function showOdds(){
    const ep=EPISODES[episode];
    if(!ep) return;
    oddsReturnScreen=activeScreen()||"#screenPrologue";
    showScreen("#screenOdds");
    const frame=$("#oddsFrame");
    frame.srcdoc=ep.entryHtml||"<html><body><p>（出走表なし）</p></body></html>";
  }

  // ---- Title ----
  function openRealTitle(){
    showScreen("#screenRealTitle");
  }
  function bindRealTitleStart(){
    const rt=$("#screenRealTitle");
    let started=false;
    const once=()=>{
      if(started) return; started=true;
      rt.removeEventListener("click",once);
      clearTaikoTimers(); showOpening();
    };
    rt.addEventListener("click",once);
  }

  // ---- Prologue ----
  function showPrologue(){
    showScreen("#screenPrologue");
    const ep=EPISODES[episode];
    const img=$("#proImage");
    const scroll=$("#proScroll");
    img.style.display="none";
    scroll.style.width="";
    scroll.style.marginLeft="";
    scroll.style.marginRight="";
    $("#proText").textContent="";
    img.onload=()=>{
      img.style.display="block";
      const ew=img.offsetWidth, eh=img.offsetHeight;
      const nw=img.naturalWidth, nh=img.naturalHeight;
      if(nw>0&&nh>0){
        const renderW=(ew/eh>=nw/nh)?eh*(nw/nh):ew;
        if(renderW<ew-1){
          scroll.style.width=renderW+"px";
          scroll.style.marginLeft="auto";
          scroll.style.marginRight="auto";
        }
      }
      $("#proText").textContent=ep.comment;
    };
    img.onerror=()=>{ img.style.display="none"; $("#proText").textContent=ep.comment; };
    img.src=`game/${ep.id}/open.png`;
    bgmPlay();
  }

  // ---- Bet tabs ----
  const tabExacta=$("#tabExacta"), tabQuinella=$("#tabQuinella");
  const areaTanshoku=$("#areaTanshoku"), areaQuinella=$("#areaQuinella");
  const stakeTan=$("#stakeTan"), stakeQu=$("#stakeQu");
  const cartRows=$("#cartRows"), limitHint=$("#limitHint");
  const bankrollLabel=$("#bankrollLabel");
  const btnConfirm=$("#btnConfirm");
  let selectedCartIdx=-1;

  function setMode(next){
    play(seChoice); mode=next;
    tabExacta.classList.toggle("active",mode==="tanshoku");
    tabQuinella.classList.toggle("active",mode==="quinella");
    areaTanshoku.style.display=mode==="tanshoku"?"":"none";
    areaQuinella.style.display=mode==="quinella"?"":"none";
    highlightSelections();
  }
  tabExacta.addEventListener("click",()=>setMode("tanshoku"));
  tabQuinella.addEventListener("click",()=>setMode("quinella"));

  function highlightSelections(){
    $("#tanshokuList").querySelectorAll(".horse-row").forEach(r=>r.classList.toggle("active",Number(r.dataset.uma)===selectedTan));
    $("#quinList1").querySelectorAll(".horse-row").forEach(r=>{
      const uma=Number(r.dataset.uma);
      r.classList.toggle("qu1-selected", uma===selectedQu1);
      r.classList.toggle("active", uma===selectedQu2);
    });
    updateTanSelLabel();
  }

  function makeHorseRow({num, name, jockey, tanOdds, waku}, oddsLabel, onClick, isDisabled){
    const row=document.createElement("div");
    row.className="horse-row"+(isDisabled?" disabled":""); row.dataset.uma=num;
    const wc=waku?`waku-c${waku}`:"";
    row.innerHTML=`<span class="hr-num ${wc}">${num}</span>`+
      `<span class="hr-info"><span class="hr-name">${name}</span><span class="hr-jockey">${jockey}</span></span>`+
      `<span class="hr-odds">${oddsLabel}</span>`;
    if(!isDisabled) row.addEventListener("click", onClick);
    return row;
  }
  function updateTanSelLabel(){
    const ep=EPISODES[episode]; const el=$("#selLabelTan"); if(!el) return;
    if(selectedTan){ const h=ep.horseList?.find(x=>x.num===selectedTan); el.textContent=`選択中：${selectedTan}番 ${h?.name||''}`; }
    else { el.textContent="馬を選んでください"; }
  }
  function renderTanshokuList(){
    const ep=EPISODES[episode];
    const list=$("#tanshokuList"); list.innerHTML="";
    (ep.horseList||[]).forEach(h=>{
      const lbl=h.tanOdds?f1(h.tanOdds)+'倍':'-';
      list.appendChild(makeHorseRow(h, lbl, ()=>{
        play(seChoice); selectedTan=h.num; highlightSelections(); limitHint.textContent=""; updateTanSelLabel();
      }, false));
    });
    updateTanSelLabel();
  }
  function renderQuinellaList(){
    const ep=EPISODES[episode];
    const list=$("#quinList1"); list.innerHTML="";
    (ep.horseList||[]).forEach(h=>{
      let lbl;
      if(!selectedQu1){
        lbl=h.tanOdds?f1(h.tanOdds)+'倍':'-';
      } else if(selectedQu1===h.num){
        lbl='← 1着';
      } else {
        const key=`${Math.min(selectedQu1,h.num)}>${Math.max(selectedQu1,h.num)}`;
        const od=ep.quinellaMap.get(key)||0;
        lbl=od?f1(od)+'倍':'-';
      }
      list.appendChild(makeHorseRow(h, lbl, ()=>{
        play(seChoice);
        if(!selectedQu1){
          selectedQu1=h.num; selectedQu2=null;
          $("#quinStep").textContent=`1着：${h.name} → 2着を選ぶ`;
        } else if(selectedQu1===h.num){
          selectedQu1=null; selectedQu2=null;
          $("#quinStep").textContent="1着の馬を決める";
        } else {
          selectedQu2=h.num;
          const sel1=ep.horseList.find(x=>x.num===selectedQu1);
          $("#quinStep").textContent=`${sel1?.name||selectedQu1} ↔ ${h.name}`;
        }
        renderQuinellaList(); highlightSelections(); limitHint.textContent="";
      }, false));
    });
  }

  function wireAmountButtons(container,input){
    container.innerHTML="";
    [[100000,"+10万"],[50000,"+5万"],[10000,"+1万"],[1000,"+1000"],[500,"+500"]].forEach(([v,lbl])=>{
      const b=document.createElement("button"); b.className="lcd-amt-btn"; b.textContent=lbl;
      b.addEventListener("click",()=>{ play(seChoice); input.value=String(Math.max(0,Number(input.value||0)+v)); });
      container.appendChild(b);
    });
    const c=document.createElement("button"); c.className="lcd-amt-btn"; c.textContent="消去";
    c.addEventListener("click",()=>{ play(seChoice); input.value="0"; });
    container.appendChild(c);
  }

  function refreshTotals(){
    const sum=cart.reduce((a,x)=>a+(Number(x.stake)||0),0);
    btnConfirm.classList.toggle("danger",bankroll-sum<0);
  }
  function renderCart(){
    cartRows.innerHTML="";
    if(cart.length===0){
      selectedCartIdx=-1;
      cartRows.innerHTML=`<tr><td colspan="5" class="lcd-subtxt">（未購入）</td></tr>`;
    } else {
      cart.forEach((c,i)=>{
        const isSelected=i===selectedCartIdx;
        const tr=document.createElement("tr");
        tr.className="cart-row-sel"+(isSelected?" selected":"");
        tr.style.cssText="cursor:pointer;"+(isSelected?"background:#e8f0fe;":"");
        const handler=()=>{ play(seChoice); selectedCartIdx=(selectedCartIdx===i)?-1:i; renderCart(); };
        const cells=[c.type, c.label, f1(c.odds), yen(c.stake), yen(Math.round(c.stake*c.odds))];
        cells.forEach(txt=>{
          const td=document.createElement("td");
          td.textContent=txt; td.style.cssText=isSelected?"background:#e8f0fe;":"";
          td.addEventListener("click", handler);
          tr.appendChild(td);
        });
        cartRows.appendChild(tr);
      });
    }
    refreshTotals();
  }
  function addToCart(item){
    limitHint.textContent=""; cart.push(item); play(seCart); renderCart();
  }
  function resetBuyState(){
    mode="tanshoku"; selectedQu1=selectedQu2=selectedTan=null;
    cart=[]; selectedCartIdx=-1; limitHint.textContent=""; stakeTan.value="0"; stakeQu.value="0";
    setMode("tanshoku");
  }

  function showBuy(isNewEpisode=false){
    showScreen("#screenBuy");
    if(isNewEpisode){ purchasedTickets=[]; episodeStartBankroll=bankroll; }
    bankrollLabel.textContent=yen(bankroll);
    resetBuyState();
    renderTanshokuList(); renderQuinellaList();
    wireAmountButtons($("#amtBarTan"),stakeTan);
    wireAmountButtons($("#amtBarQu"),stakeQu);
    renderCart(); refreshTotals(); bgmPlay();
  }

  $("#btnAddTan").addEventListener("click",()=>{
    const stake=Math.floor(Number(stakeTan.value||0));
    if(!selectedTan){limitHint.innerHTML=`<span class="lcd-danger">馬番を選んでください</span>`;return;}
    if(!(stake>0)){limitHint.innerHTML=`<span class="lcd-danger">金額を入れてください</span>`;return;}
    const ep=EPISODES[episode];
    const h=ep.horseList?.find(x=>x.num===selectedTan);
    const od=h?.tanOdds||0;
    if(!od){limitHint.innerHTML=`<span class="lcd-danger">オッズが見つかりません</span>`;return;}
    addToCart({type:"単勝",key:`TAN:${selectedTan}`,label:`${selectedTan}番 ${h?.name||''}`,odds:od,stake});
    stakeTan.value="0";
  });
  $("#btnAddQu").addEventListener("click",()=>{
    const stake=Math.floor(Number(stakeQu.value||0));
    if(!selectedQu1){limitHint.innerHTML=`<span class="lcd-danger">1頭目を選んでください</span>`;return;}
    if(!selectedQu2){limitHint.innerHTML=`<span class="lcd-danger">2頭目を選んでください</span>`;return;}
    if(!(stake>0)){limitHint.innerHTML=`<span class="lcd-danger">金額を入れてください</span>`;return;}
    const key=`${Math.min(selectedQu1,selectedQu2)}>${Math.max(selectedQu1,selectedQu2)}`;
    const od=EPISODES[episode].quinellaMap.get(key)||0;
    if(!od){limitHint.innerHTML=`<span class="lcd-danger">オッズが見つかりません</span>`;return;}
    addToCart({type:"馬連",key:`QU:${key}`,label:`${selectedQu1}↔${selectedQu2}`,odds:od,stake});
    stakeQu.value="0";
  });
  $("#btnCancelCart").addEventListener("click",()=>{
    if(selectedCartIdx<0){ limitHint.innerHTML=`<span class="lcd-danger">取消す馬券を選んでください</span>`; return; }
    play(seChoice); cart.splice(selectedCartIdx,1); selectedCartIdx=-1; limitHint.textContent=""; renderCart();
  });

  // ---- 購入済馬券ポップアップ ----
  const cartPopupOverlay=document.getElementById("cartPopupOverlay");
  cartPopupOverlay.addEventListener("click",(e)=>{
    if(e.target===cartPopupOverlay) cartPopupOverlay.style.display="none";
  });
  document.getElementById("btnViewCart").addEventListener("click",()=>{
    play(seChoice);
    const content=document.getElementById("cartPopupContent");
    if(purchasedTickets.length===0){
      content.innerHTML=`<div class="cart-popup-empty">購入した馬券はありません</div>`;
    } else {
      content.innerHTML=purchasedTickets.map(c=>
        `<div class="cart-popup-item">${c.type}　${c.label}<br>¥${yen(c.stake)} → 想定払戻 ¥${yen(Math.round(c.stake*c.odds))}</div>`
      ).join("");
    }
    cartPopupOverlay.style.display="flex";
  });

  // ---- Video ----
  const raceVideo=$("#raceVideo");
  const videoWrapper=document.getElementById("videoWrapper");
  let videoClickTimer=null;
  raceVideo.addEventListener("click",()=>{
    clearTimeout(videoClickTimer);
    videoClickTimer=setTimeout(()=>{
      if(raceVideo.paused||raceVideo.ended||raceVideo.readyState===0)
        raceVideo.play().catch(()=>{});
      else raceVideo.pause();
    },200);
  });
  videoWrapper.addEventListener("dblclick",()=>{
    clearTimeout(videoClickTimer);
    if(!document.fullscreenElement)
      videoWrapper.requestFullscreen().catch(()=>{});
    else
      document.exitFullscreen();
  });
  const overlay=document.getElementById("videoPlayOverlay");
  const videoDebug=document.getElementById("videoDebug");
  function showVideoOverlay(msg){
    videoDebug.textContent=msg||"";
    overlay.style.display="flex";
  }
  raceVideo.addEventListener("error",()=>{
    const c=raceVideo.error?.code, msg=raceVideo.error?.message||"";
    showVideoOverlay(`ERR code=${c} ${msg}\nsrc=${raceVideo.currentSrc||raceVideo.src}`);
  });
  overlay.addEventListener("click",()=>{
    raceVideo.play().then(()=>{ overlay.style.display="none"; videoDebug.textContent=""; })
      .catch(err=>{ showVideoOverlay(`${err.name}: ${err.message}\nsrc=${raceVideo.currentSrc||raceVideo.src}`); });
  });

  // ---- Video controls ----
  const btnVidPlayPause=$("#btnVidPlayPause");
  function syncPlayPauseBtn(){
    btnVidPlayPause.textContent=raceVideo.paused||raceVideo.ended?"▶":"■";
  }
  raceVideo.addEventListener("play", syncPlayPauseBtn);
  raceVideo.addEventListener("pause", syncPlayPauseBtn);
  raceVideo.addEventListener("ended", syncPlayPauseBtn);
  $("#btnVidRewind").addEventListener("click",()=>{
    raceVideo.currentTime=Math.max(0,raceVideo.currentTime-10);
  });
  btnVidPlayPause.addEventListener("click",()=>{
    if(raceVideo.paused||raceVideo.ended||raceVideo.readyState===0)
      raceVideo.play().then(()=>{ overlay.style.display="none"; }).catch(()=>{});
    else raceVideo.pause();
  });
  $("#btnVidForward").addEventListener("click",()=>{
    if(raceVideo.duration) raceVideo.currentTime=Math.min(raceVideo.duration,raceVideo.currentTime+10);
  });
  const volPopup=$("#volPopup");
  const volSlider=$("#volSlider");
  raceVideo.volume=0.7;
  volSlider.addEventListener("input",()=>{
    const v=Number(volSlider.value)/100;
    raceVideo.volume=v;
    $("#btnVidVolume").textContent="音量";
  });
  $("#btnVidVolume").addEventListener("click",(e)=>{
    e.stopPropagation();
    volPopup.classList.toggle("open");
  });
  volPopup.addEventListener("click",(e)=>e.stopPropagation());
  document.addEventListener("click",()=>{ volPopup.classList.remove("open"); });

  $("#btnVidSkip").addEventListener("click",()=>{
    play(seChoice);
    try{ raceVideo.pause(); raceVideo.src=""; }catch{}
    clearTaikoTimers(); showResult();
  });

  function confirmBet(){
    if(cart.length===0){limitHint.innerHTML=`<span class="lcd-danger">馬券がありません</span>`;return;}
    const sum=cart.reduce((a,x)=>a+(Number(x.stake)||0),0);
    if(sum>bankroll){limitHint.innerHTML=`<span class="lcd-danger">所持金が不足しています</span>`;return;}
    play(seChoice);
    bankroll-=sum;
    purchasedTickets.push(...cart);
    cart=[]; selectedCartIdx=-1;
    bankrollLabel.textContent=yen(bankroll);
    updateTopBar();
    renderCart();
    limitHint.innerHTML=`<span style="color:#2a8a2a">購入しました（${yen(sum)}円）</span>`;
  }
  function startRace(){
    play(seChoice); showScreen("#screenVideo");
    bgmStop();
    const ep=EPISODES[episode];
    if(!ep||!ep.videoPath){ showVideoOverlay("videoPath未設定"); return; }
    videoDebug.textContent=""; overlay.style.display="none";
    const hName=num=>(ep.horseList?.find(h=>h.num===num)?.name)||"";
    const sorted=[...purchasedTickets].sort((a,b)=>(b.stake||0)-(a.stake||0));
    const ticketsHTML=sorted.map(t=>{
      let line=t.type+"　";
      const mTan=t.key?.match(/^TAN:(\d+)$/);
      const mQu=t.key?.match(/^QU:(\d+)>(\d+)$/);
      if(mTan){
        const n=Number(mTan[1]);
        line+=`${n}　${hName(n)}`;
      } else if(mQu){
        const n1=Number(mQu[1]),n2=Number(mQu[2]);
        line+=`${n1}←→${n2}　${hName(n1)}、${hName(n2)}`;
      } else {
        line+=t.label;
      }
      return `<div>${line}</div>`;
    }).join("");
    const videoTickets=document.getElementById("videoTickets");
    videoTickets.innerHTML=ticketsHTML;
    videoTickets.style.display="none";
    document.getElementById("videoControls").style.display="none";
    raceVideo.src=ep.videoPath;
    raceVideo.play().then(()=>{ overlay.style.display="none"; })
      .catch(err=>{ showVideoOverlay(`${err.name}: ${err.message}\nsrc=${raceVideo.currentSrc||raceVideo.src} rs=${raceVideo.readyState}`); });
    setTimeout(()=>{
      document.getElementById("videoControls").style.display="flex";
      videoTickets.style.display="";
    }, 1000);
  }
  function startRaceFromBuy(){
    if(purchasedTickets.length===0){limitHint.innerHTML=`<span class="lcd-danger">馬券がありません（決定ボタンで購入してください）</span>`;return;}
    startRace();
  }
  btnConfirm.addEventListener("click",confirmBet);

  // ---- Settlement ----
  function isHitItem(item){
    const r=EPISODES[episode].result;
    if(item.type==="単勝"){
      const m=item.key.match(/^TAN:(\d+)$/);
      return m?Number(m[1])===r.first:false;
    }
    if(item.type==="馬単"){
      const m=item.key.match(/^EX:(\d+)>(\d+)$/);
      return m?Number(m[1])===r.first&&Number(m[2])===r.second:false;
    }
    if(item.type==="馬連"){
      const m=item.key.match(/^QU:(\d+)>(\d+)$/);
      if(!m)return false;
      const a=Number(m[1]),b=Number(m[2]);
      return(a===r.first&&b===r.second)||(a===r.second&&b===r.first);
    }
    return false;
  }
  function clearTaikoTimers(){ if(taikoTimer){clearTimeout(taikoTimer);taikoTimer=null;} }
  function scheduleTaikoIfPlus(isPlus){
    clearTaikoTimers(); if(!isPlus)return;
    taikoTimer=setTimeout(async()=>{
      try{ taiko01.currentTime=0; await taiko01.play();
        taiko01.onended=async()=>{ try{taiko02.currentTime=0;await taiko02.play();}catch{} };
      }catch{}
    },5000);
  }

  function showResult(){
    showScreen("#screenResult");
    const ep=EPISODES[episode];
    const dateStr=RACE_DATES[episode]||"";
    bgmPlay();
    const tbody=$("#resultRows");
    tbody.innerHTML="";
    fetch(`game/${ep.id}/着順.csv`)
      .then(r=>r.arrayBuffer())
      .then(buf=>{
        let text;
        try{ text=new TextDecoder('utf-8',{fatal:true}).decode(buf); }
        catch{ text=new TextDecoder('shift-jis').decode(buf); }
        const lines=text.trim().split('\n').slice(1);
        lines.forEach(line=>{
          const cols=line.split(',').map(s=>s.trim());
          const rank=parseInt(cols[0]);
          if(isNaN(rank)||rank<1) return;
          const tr=document.createElement("tr");
          [cols[0],cols[1],cols[2],cols[3],cols[7]||"",cols[8]||""].forEach(txt=>{
            const td=document.createElement("td");
            td.textContent=txt;
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
      })
      .catch(()=>{});
  }

  function showSettlement(){
    settledEpisode=episode;
    showScreen("#screenSettlement");
    $("#settleSub").textContent=`清算（レース${episode}/${totalEpisodes}）`;
    bgmPlay();
    const settleRows=$("#settleRows");
    settleRows.innerHTML="";
    const totalBet=purchasedTickets.reduce((a,x)=>a+(Number(x.stake)||0),0);
    let totalPayout=0;
    if(purchasedTickets.length===0){
      settleRows.innerHTML=`<tr><td colspan="5" class="lcd-subtxt">（購入なし）</td></tr>`;
    } else {
      purchasedTickets.forEach(c=>{
        const hit=isHitItem(c);
        const payout=hit?Math.round((c.stake||0)*(c.odds||0)):0;
        totalPayout+=payout;
        const badge=hit?`<span class="badge-hit">HIT</span>`:`<span class="badge-lose">LOSE</span>`;
        const tr=document.createElement("tr");
        tr.innerHTML=`<td>${c.type}${badge}</td><td>${c.label}</td><td>${f1(c.odds||0)}</td><td>${yen(c.stake)}</td><td>${yen(payout)}</td>`;
        settleRows.appendChild(tr);
      });
    }
    $("#settleBet").textContent=yen(totalBet);
    $("#settlePayout").textContent=yen(totalPayout);
    const delta=totalPayout-totalBet, isPlus=delta>=0;
    const sd=$("#settleDelta");
    sd.textContent=(isPlus?"+":"−")+yen(Math.abs(delta));
    sd.className=isPlus?"delta-plus":"delta-minus";
    const finalMoney=bankroll+totalPayout;
    bankroll=finalMoney;
    $("#settleFinal").textContent=yen(finalMoney);
    const settleImg=$("#settleImg");
    if(delta!==0){
      const imgName=delta>0?"精算プラス.png":"精算マイナス.png";
      settleImg.style.display="none";
      settleImg.onerror=()=>{ settleImg.style.display="none"; };
      settleImg.onload=()=>{ settleImg.style.display=""; };
      settleImg.src=`game/${EPISODES[episode].id}/${imgName}`;
    } else {
      settleImg.style.display="none"; settleImg.src="";
    }
    play(seMoney); scheduleTaikoIfPlus(isPlus);
    updateTopBar();
  }

  function showRate(){
    showScreen("#screenRate");
    const rate=Math.min(100,Math.max(0,Math.floor((bankroll/goalBankroll)*100)));
    $("#rateLine").textContent=`達成率＝${rate}％`;
    $("#rateClear").textContent=rate===100?"クリア！":"";
    if(rate===100){ try{taiko01.currentTime=0;taiko01.play();}catch{} }
  }

  async function showGameOver(){
    stopAllAudio();
    showScreen("#screenGameOver");
    try{
      const text=await fetch('game/gameover/レースコメント.txt').then(r=>r.ok?r.text():'').catch(()=>'');
      $("#gameoverText").textContent=text.trim();
    }catch{}
    try{
      const goAudio=new Audio('game/gameover/move.m4a');
      goAudio.play().catch(()=>{});
    }catch{}
  }

  async function showEnding(){
    showScreen("#screenEnding");
    bgmStop();

    const th=$("#endthemeAudio");
    th.volume=0.25;
    th.currentTime=0;
    th.onended=()=>{
      try{ bgm.currentTime=0; bgm.loop=true; bgm.play().catch(()=>{}); }catch{}
    };

    let endingCommentText="";
    try{
      endingCommentText=await fetch('game/ending/レースコメント.txt').then(r=>r.ok?r.text():'').catch(()=>'');
    }catch{}
    $("#endingText").textContent="";
    const blackout=$("#endingBlackout");
    blackout.style.display="none"; blackout.style.opacity="0";
    const ev=$("#endingVideo");
    const scroll=$("#endingScroll");

    ev.onloadedmetadata=()=>{
      const vw=ev.offsetWidth, vh=ev.offsetHeight;
      const nw=ev.videoWidth, nh=ev.videoHeight;
      if(nw>0&&nh>0&&vw>0&&vh>0){
        const renderW=(vw/vh>=nw/nh)?vh*(nw/nh):vw;
        if(renderW<vw-1){
          scroll.style.width=renderW+"px";
          scroll.style.marginLeft="auto";
          scroll.style.marginRight="auto";
        } else {
          scroll.style.width="";
          scroll.style.marginLeft="";
          scroll.style.marginRight="";
        }
      }
    };
    ev.onended=()=>{
      setTimeout(()=>{
        try{
          th.play().catch(()=>{});
          setTimeout(()=>{
            blackout.style.display="flex";
            requestAnimationFrame(()=>requestAnimationFrame(()=>{ blackout.style.opacity="1"; }));
            blackout.addEventListener("click",()=>{ stopAllAudio(); openRealTitle(); bindRealTitleStart(); },{once:true});
          }, 30000);
        }catch{}
      }, 5000);
    };
    ev.src='';
    setTimeout(()=>{
      ev.src='game/ending/move.mp4';
      ev.play().catch(()=>{});
      setTimeout(()=>{
        $("#endingText").textContent=endingCommentText.trim();
      }, 1000);
    }, 5000);
  }

  async function showOpening(){
    showScreen("#screenOpening");
    bgmStop();
    let openingCommentText="";
    try{
      openingCommentText=await fetch('game/opening/レースコメント.txt').then(r=>r.ok?r.text():'').catch(()=>'');
    }catch{}
    $("#openingText").textContent="";
    const ov=$("#openingVideo");
    const scroll=$("#openingScroll");
    ov.src='';
    // 3秒黒画面・無音の後に動画開始
    setTimeout(()=>{
      let commentShown=false;
      ov.ontimeupdate=()=>{
        if(!commentShown && ov.currentTime>=11){
          commentShown=true;
          $("#openingText").textContent=openingCommentText.trim();
        }
      };
      ov.onloadedmetadata=()=>{
        const vw=ov.offsetWidth, vh=ov.offsetHeight;
        const nw=ov.videoWidth, nh=ov.videoHeight;
        if(nw>0&&nh>0&&vw>0&&vh>0){
          const renderW=(vw/vh>=nw/nh)?vh*(nw/nh):vw;
          if(renderW<vw-1){
            scroll.style.width=renderW+"px";
            scroll.style.marginLeft="auto";
            scroll.style.marginRight="auto";
          } else {
            scroll.style.width="";
            scroll.style.marginLeft="";
            scroll.style.marginRight="";
          }
        }
      };
      ov.src='game/opening/move.mp4';
      ov.play().catch(()=>{});
    }, 3000);
  }

  function advanceFromSettlement(){
    play(seChoice); clearTaikoTimers();
    if(bankroll<=0){ showGameOver(); return; }
    if(settledEpisode<totalEpisodes){
      episode=settledEpisode+1;
      purchasedTickets=[]; episodeStartBankroll=bankroll;
      showPrologue();
    }
    else showEnding();
  }

  // ---- マウスドラッグスクロール ----
  function enableDragScroll(el){
    let down=false, sy=0, st=0;
    el.addEventListener("pointerdown",e=>{
      if(e.target.closest(".horse-row,button,a,input,select,td,th")) return;
      down=true; sy=e.clientY; st=el.scrollTop;
      el.setPointerCapture(e.pointerId);
      el.style.cursor="grabbing";
    });
    el.addEventListener("pointermove",e=>{
      if(!down) return;
      el.scrollTop=st-(e.clientY-sy);
    });
    const up=()=>{ down=false; el.style.cursor=""; };
    el.addEventListener("pointerup",up);
    el.addEventListener("pointercancel",up);
  }
  document.querySelectorAll(".ls-scroll").forEach(enableDragScroll);

  // ---- Nav buttons ----
  let shinbunReturnScreen="#screenPrologue";
  let menuReturnScreen="#screenPrologue";

  function showMenu(){
    const active=activeScreen();
    if(active==="#screenVideo"||active==="#screenLoading"||active==="#screenRealTitle") return;
    menuReturnScreen=active||"#screenPrologue";
    const ep=EPISODES[episode];
    document.getElementById("menuPassword").textContent=ep?ep.id+String(bankroll):"------";
    document.getElementById("menuPwInput").value="";
    document.getElementById("menuPwResult").textContent="";
    showScreen("#screenMenu");
  }

  document.getElementById("menuPwSubmit").addEventListener("click",()=>{
    const pw=document.getElementById("menuPwInput").value.trim();
    const result=document.getElementById("menuPwResult");
    if(pw.length<3){ result.style.color="#f77"; result.textContent="呪文が短すぎます"; return; }
    const id=pw.slice(0,2);
    const money=parseInt(pw.slice(2),10);
    const epNum=parseInt(id,10);
    if(!epNum||!EPISODES[epNum]||isNaN(money)||money<0){
      result.style.color="#f77"; result.textContent="呪文が正しくありません"; return;
    }
    play(seChoice);
    episode=epNum; bankroll=money;
    shinbunPaid.clear();
    purchasedTickets=[];
    showPrologue();
  });

  function showShinbun(){
    const alreadyPaid=shinbunPaid.has(episode);
    if(!alreadyPaid && bankroll<1000) return;
    play(seChoice);
    shinbunReturnScreen=activeScreen()||"#screenPrologue";
    const id=EPISODES[episode]?.id||String(episode).padStart(2,"0");
    fetch(`game/${id}/新聞.txt`).then(r=>r.ok?r.text():"").catch(()=>"").then(text=>{
      const content=document.getElementById("shinbunContent");
      if(!content) return;
      if(!text.trim()){
        content.textContent="（このレースの新聞はありません）";
      } else {
        if(!alreadyPaid){
          bankroll-=1000;
          bankrollLabel.textContent=yen(bankroll);
          refreshTotals();
          shinbunPaid.add(episode);
          updateTopBar();
        }
        content.textContent=text.trim();
      }
      showScreen("#screenShinbun");
    });
  }

  $("#navToggle").addEventListener("click",()=>{
    const active=activeScreen();
    if(active==="#screenMenu"){ play(seChoice); showScreen(menuReturnScreen); return; }
    play(seChoice); showMenu();
  });

  $("#navInfo").addEventListener("click",()=>{
    const active=activeScreen();
    if(active==="#screenShinbun"){ play(seChoice); showScreen(shinbunReturnScreen); return; }
    showShinbun();
  });

  $("#navOdds").addEventListener("click",()=>{
    const active=activeScreen();
    if(active==="#screenOdds"){ play(seChoice); showScreen(oddsReturnScreen); return; }
    play(seChoice); showOdds();
  });

  $("#navBet").addEventListener("click",()=>{
    const active=activeScreen();
    if(active==="#screenBuy") return;
    if(active==="#screenVideo") return;
    play(seChoice);
    if(active==="#screenSettlement"){
      if(settledEpisode<totalEpisodes){ episode=settledEpisode+1; showBuy(true); }
      return;
    }
    if(active==="#screenPrologue"){ showBuy(true); return; }
    showBuy();
  });

  $("#navStart").addEventListener("click",()=>{
    const active=activeScreen();
    if(active==="#screenRealTitle"){ play(seChoice); showOpening(); }
    else if(active==="#screenPrologue") startRace();
    else if(active==="#screenBuy") startRaceFromBuy();
    else if(active==="#screenVideo"){ play(seChoice); try{raceVideo.pause(); raceVideo.src="";}catch{} clearTaikoTimers(); showResult(); }
    else if(active==="#screenResult"){ play(seChoice); showSettlement(); }
    else if(active==="#screenSettlement") advanceFromSettlement();
    else if(active==="#screenEnding"){ play(seChoice); const ev=$("#endingVideo"); try{ev.pause();ev.src="";}catch{} openRealTitle(); bindRealTitleStart(); }
    else if(active==="#screenGameOver"){ play(seChoice); openRealTitle(); bindRealTitleStart(); }
  });

  $("#btnGameoverNext").addEventListener("click",()=>{
    play(seChoice); stopAllAudio(); openRealTitle(); bindRealTitleStart();
  });

  $("#btnOpeningNext").addEventListener("click",()=>{
    play(seChoice);
    const ov=$("#openingVideo");
    try{ ov.pause(); ov.src=""; }catch{}
    episode=1; showPrologue();
  });

  openRealTitle();
  bindRealTitleStart();
  updateTopBar();

  // iOS PWA用：初回タップで全audioをアンロック
  // iOS AudioContext unlock（audio要素を再生せず無音でアンロック）
  document.addEventListener("touchstart", ()=>{
    try{
      const ctx=new (window.AudioContext||window.webkitAudioContext)();
      ctx.resume().then(()=>ctx.close()).catch(()=>{});
    }catch{}
  }, {once:true});
})();
</script>
</body>
</html>
